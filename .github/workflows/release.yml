name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match package.json `version`, no leading `v`)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Check format and lint
        run: vp run check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp run test

      - name: Build
        run: vp run build

      - name: Verify version matches package.json
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "${{ inputs.version }}" ]; then
            echo "::error::Input version '${{ inputs.version }}' does not match package.json version '$pkg_version'"
            exit 1
          fi

      - name: Extract release notes from CHANGES.md
        run: node tools/extract-changelog.mjs "${{ inputs.version }}" > release-notes.md

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body_path: release-notes.md

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          pnpm publish --access public --no-git-checks
          rm -f .npmrc

      - name: Skip npm publish
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is not set; skipping npm publish."
